{% extends "layout.html" %}
{% block content %}
<section class="page-section order-page">
    <h1>Formulaire de commande</h1>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    <form class="order-form" action="/commander" method="post" enctype="multipart/form-data">
        <label for="nom">Nom / Prénom *</label>
        <input type="text" id="nom" name="nom" required>

        <label for="email">Email *</label>
        <input type="email" id="email" name="email" required>

        <label for="photo">Upload de photo (JPG/PNG, max 10 Mo) *</label>
        <input type="file" id="photo" name="photo" accept="image/jpeg,image/png" required>

        <label for="product_type">Type de produit *</label>
        <select id="product_type" name="product_type" required>
            <option value="">Choisir un produit</option>
            <option value="autocollant">Autocollant</option>
            <option value="carte_postale">Carte postale</option>
        </select>

        <label for="quantite">Quantité *</label>
        <input type="number" id="quantite" name="quantite" min="1" value="1" required>

        <label for="adresse_type">Adresse de livraison *</label>
        <select id="adresse_type" name="adresse_type" required>
            <option value="">Choisir une option</option>
            <option value="Maison">Maison</option>
            <option value="École">École</option>
            <option value="Autre">Autre</option>
        </select>

        <div id="adresse-detail-container" class="hidden">
            <label for="adresse_detail">Précisez l'adresse *</label>
            <textarea id="adresse_detail" name="adresse_detail" rows="3"></textarea>
        </div>

        <label for="message">Message personnalisé (optionnel)</label>
        <textarea id="message" name="message" rows="3"></textarea>

        <button type="submit" class="primary-button">Valider ma commande</button>
    </form>
</section>
<script>
    const adresseType = document.getElementById('adresse_type');
    const adresseDetailContainer = document.getElementById('adresse-detail-container');
    const adresseDetail = document.getElementById('adresse_detail');

    adresseType.addEventListener('change', function() {
        if (this.value === 'Autre') {
            adresseDetailContainer.classList.remove('hidden');
            adresseDetail.required = true;
        } else {
            adresseDetailContainer.classList.add('hidden');
            adresseDetail.required = false;
            adresseDetail.value = '';
        }
    });
</script>
{% endblock %}
