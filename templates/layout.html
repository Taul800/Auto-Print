<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auto Print - {{ title }}</title>
    <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
    <header class="site-header">
        <div class="brand">
            <span class="logo-icon">🖨️</span>
            <div>
                <span class="logo-name">Auto Print</span>
                <span class="logo-tag">Autocollants & cartes postales sur mesure</span>
            </div>
        </div>
        <nav class="main-nav">
            <a href="/">Accueil</a>
            <a href="/produits">Nos produits</a>
            <a href="/commander">Commander</a>
            <a href="/contact">Contact</a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <p>Auto Print — Livraison en France | Paiement à la livraison ou par virement</p>
    </footer>
</body>
</html>
